/* ── css/styles.css ─────────────────────────────────────── */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26;
  --border: rgba(255,255,255,0.08); --text: #f0f0f8;
  --text-muted: #8888aa; --accent: #6c63ff; --accent2: #a855f7;
}
html, body { height: 100%; background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text); }
html { scroll-behavior: smooth; }
#root { min-height: 100vh; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

@keyframes fadeIn  { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
@keyframes pulse   { 0%,100% { transform:scale(1); opacity:1; } 50% { transform:scale(1.05); opacity:.8; } }
@keyframes float   { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-8px); } }
@keyframes ripple  { 0% { transform:scale(.8); opacity:1; } 100% { transform:scale(2.4); opacity:0; } }
@keyframes slideIn { from { opacity:0; transform:translateX(30px); } to { opacity:1; transform:translateX(0); } }

.fade-in  { animation: fadeIn  0.5s ease forwards; }
.slide-in { animation: slideIn 0.4s ease forwards; }

.noise-bg { position:fixed; inset:0; pointer-events:none; z-index:0; opacity:.4;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E"); }
.orb { position:fixed; border-radius:50%; filter:blur(80px); pointer-events:none; z-index:0; transition:background 1.5s ease; }

.card { background:var(--surface); border:1px solid var(--border); border-radius:16px; transition:border-color .3s; }
.card:hover { border-color:rgba(255,255,255,.15); }
.content-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; transition:all .3s ease; cursor:pointer; }
.content-card:hover { transform:translateY(-4px); box-shadow:0 12px 40px rgba(0,0,0,.4); }

.form-input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:14px 16px; color:var(--text); font-family:'Inter',sans-serif; font-size:15px; outline:none; transition:border-color .2s,box-shadow .2s; resize:none; }
.form-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(108,99,255,.15); }
.form-input::placeholder { color:var(--text-muted); }

input[type=range] { -webkit-appearance:none; width:100%; height:6px; background:var(--surface2); border-radius:3px; outline:none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:22px; height:22px; border-radius:50%; background:linear-gradient(135deg,#6c63ff,#a855f7); cursor:pointer; transition:transform .2s; box-shadow:0 0 10px rgba(108,99,255,.6); }
input[type=range]::-webkit-slider-thumb:hover { transform:scale(1.2); }

.btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; border-radius:12px; padding:14px 28px; color:#fff; font-size:15px; font-weight:600; cursor:pointer; transition:all .2s ease; font-family:'Inter',sans-serif; }
.btn-primary:hover:not(:disabled) { transform:translateY(-1px); box-shadow:0 8px 24px rgba(108,99,255,.4); }
.btn-primary:active:not(:disabled) { transform:translateY(0); }
.btn-primary:disabled { opacity:.4; cursor:not-allowed; }

.btn-ghost { background:transparent; border:1px solid var(--border); border-radius:12px; padding:12px 24px; color:var(--text-muted); font-size:14px; font-weight:500; cursor:pointer; transition:all .2s ease; font-family:'Inter',sans-serif; }
.btn-ghost:hover { border-color:rgba(255,255,255,.2); color:var(--text); background:var(--surface2); }

.option-btn { border:1px solid var(--border); border-radius:12px; padding:12px 16px; background:var(--surface2); color:var(--text-muted); cursor:pointer; transition:all .2s ease; font-family:'Inter',sans-serif; font-size:14px; font-weight:500; text-align:left; width:100%; }
.option-btn:hover { border-color:rgba(255,255,255,.2); color:var(--text); }
.option-btn.selected { border-color:var(--accent); color:var(--text); background:rgba(108,99,255,.1); }

.word-chip { border:1px solid var(--border); border-radius:999px; padding:6px 14px; background:var(--surface2); color:var(--text-muted); cursor:pointer; transition:all .2s ease; font-size:13px; font-weight:500; white-space:nowrap; font-family:'Inter',sans-serif; }
.word-chip:hover { border-color:rgba(255,255,255,.2); color:var(--text); }
.word-chip.selected { border-color:var(--accent); color:var(--text); background:rgba(108,99,255,.12); }

.tab-btn { padding:10px 20px; border-radius:10px; border:none; background:transparent; color:var(--text-muted); font-size:14px; font-weight:500; cursor:pointer; transition:all .2s ease; font-family:'Inter',sans-serif; }
.tab-btn.active { background:var(--surface2); color:var(--text); box-shadow:0 2px 8px rgba(0,0,0,.3); }
.tab-btn:hover:not(.active) { color:var(--text); }

.progress-bar  { height:3px; background:var(--surface2); border-radius:2px; overflow:hidden; }
.progress-fill { height:100%; border-radius:2px; background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:width .4s ease; }
.conf-bar-track { height:6px; background:var(--surface2); border-radius:3px; overflow:hidden; width:100%; }
.conf-bar-fill  { height:100%; border-radius:3px; transition:width 1s ease .3s; }

.dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin:0 3px; }
.dot:nth-child(1) { animation:pulse 1.2s .0s infinite; }
.dot:nth-child(2) { animation:pulse 1.2s .2s infinite; }
.dot:nth-child(3) { animation:pulse 1.2s .4s infinite; }

.badge     { display:inline-block; padding:3px 8px; border-radius:6px; font-size:11px; font-weight:600; letter-spacing:.5px; }
.llm-badge { display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:999px; font-size:11px; font-weight:700; letter-spacing:.4px; background:rgba(108,99,255,.15); border:1px solid rgba(108,99,255,.3); color:#a78bfa; }
.success-dot { width:8px; height:8px; border-radius:50%; background:#34d399; display:inline-block; box-shadow:0 0 6px #34d399; }
.star { color:#fbbf24; font-size:12px; }

.scroll-row { display:flex; gap:16px; overflow-x:auto; padding-bottom:8px; }
.scroll-row::-webkit-scrollbar { height:4px; }
.scroll-row::-webkit-scrollbar-thumb { background:#333; border-radius:2px; }

.key-input-wrap { position:relative; }
.key-input-wrap .toggle-eye { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:16px; padding:4px; }
.overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); backdrop-filter:blur(6px); z-index:100; display:flex; align-items:center; justify-content:center; padding:20px; animation:fadeIn .2s ease; }
.error-banner { background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.3); border-radius:10px; padding:12px 16px; color:#fca5a5; font-size:13px; display:flex; align-items:flex-start; gap:10px; }
  </style>

/* ── js/engine.js ───────────────────────────────────────── */

const GROQ_MODEL    = 'llama-3.3-70b-versatile';
const GROQ_ENDPOINT = 'https://api.groq.com/openai/v1/chat/completions';
const VALID_EMOTIONS = ['happy','sad','anxious','excited','calm','angry','romantic','bored'];

const SYSTEM_PROMPT = `You are an expert emotion detection AI for MoodStream, a personalised streaming platform. Your only job is to analyse a user's mood description and classify it into exactly one emotion category.

The 8 categories are: happy, sad, anxious, excited, calm, angry, romantic, bored.

Guidelines:
- "happy"    → joy, elation, gratitude, contentment with positive energy
- "sad"      → grief, loneliness, heartbreak, nostalgia, feeling low
- "anxious"  → stress, worry, overwhelm, nervousness, panic
- "excited"  → hype, motivation, anticipation, adrenaline, feeling pumped
- "calm"     → peace, serenity, chill, relaxation, quietness
- "angry"    → frustration, irritation, rage, resentment, being fed up
- "romantic" → love, longing, tenderness, being in love, missing someone romantically
- "bored"    → restlessness, numbness, indifference, needing stimulation

You MUST respond with ONLY a valid JSON object. No markdown, no extra text outside the JSON.

Response format:
{
  "emotion": "<one of the 8 categories>",
  "confidence": <integer 0-100>,
  "reason": "<one warm sentence directed at the user explaining why>",
  "secondary": "<optional second emotion if strongly present, or null>"
}`;

async function detectEmotionWithGroq(apiKey, text, energy, intent) {
  const energyLabel = ['','very drained','a bit low on energy','moderate energy','fairly energetic','very wired'][energy];
  const intentLabel = { escape:'escape reality', relate:'feel understood', energize:'get motivated', relax:'slow down and rest' }[intent] || intent;

  const userMessage =
    `How I'm feeling: "${text}"\n` +
    `My energy level: ${energyLabel} (${energy}/5)\n` +
    `What I want from content right now: ${intentLabel}\n\nPlease detect my emotion.`;

  const response = await fetch(GROQ_ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
    body: JSON.stringify({
      model: GROQ_MODEL,
      messages: [{ role:'system', content:SYSTEM_PROMPT }, { role:'user', content:userMessage }],
      temperature: 0.3,
      max_tokens: 200,
      response_format: { type:'json_object' },
    }),
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err?.error?.message || `Groq returned HTTP ${response.status}`);
  }

  const data   = await response.json();
  const parsed = JSON.parse(data.choices?.[0]?.message?.content || '{}');
  if (!VALID_EMOTIONS.includes(parsed.emotion)) throw new Error(`Unexpected emotion: "${parsed.emotion}"`);

  return {
    emotion:    parsed.emotion,
    confidence: Math.max(0, Math.min(100, Number(parsed.confidence) || 75)),
    reason:     parsed.reason    || 'Your mood has been detected.',
    secondary:  VALID_EMOTIONS.includes(parsed.secondary) ? parsed.secondary : null,
  };
}

const EMOTION_KEYWORDS = {
  happy:    ['happy','great','good','wonderful','joyful','amazing','fantastic','cheerful','elated','thrilled','glad','awesome','blessed','grateful','ecstatic'],
  sad:      ['sad','down','depressed','unhappy','crying','cry','lonely','miss','hurt','heartbroken','grief','lost','empty','hopeless','melancholy','blue','miserable'],
  anxious:  ['anxious','stressed','worried','nervous','overwhelmed','panic','anxiety','fear','scared','tense','pressure','burden','overthinking','restless'],
  excited:  ['excited','pumped','thrilled','hyped','energized','ready','motivated','fired','alive','electric','stoked','adrenaline'],
  calm:     ['calm','peaceful','relaxed','quiet','serene','chill','tranquil','content','still','zen','mellow','easy','gentle','soft','cozy'],
  angry:    ['angry','mad','frustrated','annoyed','irritated','furious','rage','upset','bitter','hate','resentful'],
  romantic: ['romantic','love','crush','date','miss','longing','affection','heart','soulmate','feelings','warm','tender','intimate'],
  bored:    ['bored','nothing','meh','blah','listless','uninterested','monotonous','dull','flat','numb','indifferent'],
};

function detectEmotionFallback(text, energy, intent) {
  const lower  = text.toLowerCase();
  const scores = {};
  for (const [emotion, keywords] of Object.entries(EMOTION_KEYWORDS)) {
    scores[emotion] = keywords.filter(k => lower.includes(k)).length;
  }
  if (energy >= 4) { scores.excited = (scores.excited||0) + 1.5; scores.happy = (scores.happy||0) + 0.5; }
  if (energy <= 2) { scores.calm    = (scores.calm||0)    + 1.0; scores.sad   = (scores.sad||0)   + 0.5; }
  if (intent === 'energize') scores.excited = (scores.excited||0) + 1;
  if (intent === 'relax')    scores.calm    = (scores.calm||0)    + 1;
  if (intent === 'relate')   scores.sad     = (scores.sad||0)     + 0.5;
  if (intent === 'escape')   scores.anxious = (scores.anxious||0) + 0.5;
  const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]);
  return { emotion: sorted[0][1] > 0 ? sorted[0][0] : 'calm', confidence:60, reason:'Detected using offline keyword analysis (AI not connected).', secondary: sorted[1]?.[1] > 0 ? sorted[1][0] : null };
}

function SettingsModal({ apiKey, onSave, onClose }) {
  const [val, setVal] = useState(apiKey||'');
  const [showKey, setShowKey] = useState(false);
  const [testing, setTesting] = useState(false);
  const [testResult, setTestResult] = useState(null);

  async function handleTest() {
    if (!val.trim()) return;
    setTesting(true); setTestResult(null);
    try {
      const res = await detectEmotionWithGroq(val.trim(),'I feel happy and excited today',4,'energize');
      setTestResult({ ok:true, msg:`✓ Connected! Test result: ${res.emotion} (${res.confidence}% confidence)` });
    } catch(e) { setTestResult({ ok:false, msg:`✗ ${e.message}` }); }
    setTesting(false);
  }

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="card fade-in" style={{ width:'100%', maxWidth:460, padding:32 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:24 }}>

          <button className="btn-ghost" style={{ padding:'6px 12px' }} onClick={onClose}>✕</button>
        </div>
        <p style={{ color:'var(--text-muted)', fontSize:14, marginBottom:20, lineHeight:1.6 }}>
          MoodStream uses <strong style={{ color:'var(--text)' }}>Groq · {GROQ_MODEL}</strong> to detect your emotion. Your key is stored in memory only.
        </p>
        <div style={{ background:'rgba(108,99,255,.08)', border:'1px solid rgba(108,99,255,.2)', borderRadius:10, padding:'12px 16px', marginBottom:20, fontSize:13, color:'var(--text-muted)', lineHeight:1.7 }}>
          🔑 <strong style={{ color:'var(--text)' }}>Get a free key:</strong> <span style={{ color:'#a78bfa' }}>console.groq.com</span> → API Keys → Create new key
        </div>
        <label style={{ fontSize:13, color:'var(--text-muted)', display:'block', marginBottom:8 }}>Groq API Key</label>
        <div className="key-input-wrap" style={{ marginBottom:16 }}>
          <input className="form-input" type={showKey?'text':'password'} placeholder="gsk_..." value={val} onChange={e=>{setVal(e.target.value);setTestResult(null);}} style={{ paddingRight:44 }} />
          <button className="toggle-eye" onClick={()=>setShowKey(s=>!s)}>{showKey?'🙈':'👁️'}</button>
        </div>
        {testResult && (
          <div style={{ padding:'10px 14px', borderRadius:10, marginBottom:16, fontSize:13, fontWeight:500, background:testResult.ok?'rgba(52,211,153,.1)':'rgba(239,68,68,.1)', border:`1px solid ${testResult.ok?'rgba(52,211,153,.3)':'rgba(239,68,68,.3)'}`, color:testResult.ok?'#34d399':'#f87171' }}>
            {testResult.msg}
          </div>
        )}
        <div style={{ display:'flex', gap:10 }}>
          <button className="btn-ghost" style={{ flex:1 }} onClick={handleTest} disabled={!val.trim()||testing}>{testing?'⏳ Testing…':'🧪 Test Key'}</button>
          <button className="btn-primary" style={{ flex:2 }} disabled={!val.trim()} onClick={()=>{onSave(val.trim());onClose();}}>Save &amp; Continue →</button>
        </div>
      </div>
    </div>
  );
}

  const [formStep,        setFormStep]        = useState(1);
  const [formData,        setFormData]        = useState({ text:'', words:[], energy:3, intent:'' });
  const [result,          setResult]          = useState(null);
  const [activeTab,       setActiveTab]       = useState('movies');
  const [analyzeProgress, setAnalyzeProgress] = useState(0);
  const [analyzeMsg,      setAnalyzeMsg]      = useState('');
  const [apiError,        setApiError]        = useState(null);
  const [usedFallback,    setUsedFallback]    = useState(false);

  const ec = result ? EMOTION_CONFIG[result.emotion] : null;

  function handleWordToggle(word) {
    setFormData(fd => {
      const words = fd.words.includes(word) ? fd.words.filter(w=>w!==word) : [...fd.words, word];
      const text  = fd.text.includes(word) ? fd.text : fd.text + (fd.text?', ':'') + word;
      return { ...fd, words, text };
    });
  }

  async function handleAnalyze() {
    setStep('analyzing'); setAnalyzeProgress(0); setApiError(null); setUsedFallback(false);
    const MSGS = ['Reading your words…','Understanding your feeling…','Detecting emotional patterns…','Matching your mood…','Curating your content…'];
    let idx = 0; setAnalyzeMsg(MSGS[0]);
    const timer = setInterval(() => {
      setAnalyzeProgress(p => {
        const next = Math.min(p + Math.random()*12+3, 85);
        const ni   = Math.min(Math.floor(next/20), MSGS.length-1);
        if (ni !== idx) { idx = ni; setAnalyzeMsg(MSGS[ni]); }
        if (next >= 85) clearInterval(timer);
        return next;
      });
    }, 180);

    let detected;
    try {
      if (!apiKey || apiKey === 'demo') throw new Error('No API key — using offline mode.');
      detected = await detectEmotionWithGroq(apiKey, formData.text, formData.energy, formData.intent);
    } catch(err) {
      clearInterval(timer);
      setUsedFallback(true); setApiError(err.message);
      detected = detectEmotionFallback(formData.text, formData.energy, formData.intent);
    }

    setAnalyzeMsg('All set!'); setAnalyzeProgress(100); setResult(detected);
    setTimeout(() => { setStep('results'); setActiveTab('movies'); }, 500);
  }

  function reset() {
    setStep('home'); setFormStep(1); setFormData({ text:'', words:[], energy:3, intent:'' });
    setResult(null); setApiError(null); setUsedFallback(false);
  }

  const canAdvance1 = formData.text.trim().length >= 3;
  const canAnalyze  = formData.intent !== '';

  /* ── Screen: API Key ── */
  if (step === 'apikey') return (
    <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:24, position:'relative', overflow:'hidden' }}>
      <div className="noise-bg" />
      <div className="orb" style={{ width:500, height:500, top:-100, left:-100, background:'rgba(108,99,255,.12)' }} />
      <div className="orb" style={{ width:400, height:400, bottom:-80, right:-80, background:'rgba(168,85,247,.10)' }} />
      <div className="card fade-in" style={{ width:'100%', maxWidth:460, padding:40, position:'relative', zIndex:1 }}>
        <div style={{ textAlign:'center', marginBottom:32 }}>
          <div style={{ fontSize:56, marginBottom:12, animation:'float 3s ease-in-out infinite' }}>🎭</div>
          <h1 style={{ fontSize:26, fontWeight:900, marginBottom:8 }}>Welcome to <span style={{ background:'linear-gradient(135deg,#6c63ff,#a855f7)', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent' }}>MoodStream</span></h1>
          <p style={{ color:'var(--text-muted)', fontSize:14, lineHeight:1.6 }}>Connect your Groq API key to enable AI-powered emotion detection. Your key never leaves your browser.</p>
        </div>
        <div style={{ background:'rgba(108,99,255,.08)', border:'1px solid rgba(108,99,255,.2)', borderRadius:12, padding:'14px 18px', marginBottom:24, display:'flex', alignItems:'flex-start', gap:12 }}>
          <span style={{ fontSize:20, marginTop:1 }}>🔑</span>
          <div>
            <div style={{ fontSize:13, fontWeight:600, marginBottom:4 }}>How to get a free Groq key</div>
            <div style={{ fontSize:12, color:'var(--text-muted)', lineHeight:1.7 }}>
              1. Go to <span style={{ color:'#a78bfa' }}>console.groq.com</span><br/>
              2. Sign up (free) → API Keys → Create new key<br/>
              3. Paste it below — fast LLM calls on the free tier
            </div>
          </div>
        </div>
        <label style={{ fontSize:13, color:'var(--text-muted)', display:'block', marginBottom:8 }}>Groq API Key</label>
        <div className="key-input-wrap" style={{ marginBottom:20 }}>
          <input className="form-input" type="password" placeholder="gsk_..." value={apiKey} onChange={e=>setApiKey(e.target.value)} onKeyDown={e=>e.key==='Enter'&&apiKey.trim()&&setStep('home')} />
        </div>
        <button className="btn-primary" style={{ width:'100%', fontSize:16 }} disabled={!apiKey.trim()} onClick={()=>setStep('home')}>Start MoodStream →</button>
        <button style={{ background:'none', border:'none', color:'var(--text-muted)', fontSize:13, marginTop:14, cursor:'pointer', width:'100%', fontFamily:'Inter,sans-serif', textDecoration:'underline' }} onClick={()=>{setApiKey('demo');setStep('home');}}>
          Skip for now (use offline keyword detection)
        </button>
      </div>
    </div>
  );

  /* ── Screen: Home ── */
  if (step === 'home') return (
    <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:24, position:'relative', overflow:'hidden' }}>
      <div className="noise-bg" />
      <div className="orb" style={{ width:500, height:500, top:-100, left:-100, background:'rgba(108,99,255,.12)' }} />
      <div className="orb" style={{ width:400, height:400, bottom:-80, right:-80, background:'rgba(168,85,247,.10)' }} />
      <div style={{ position:'fixed', top:0, left:0, right:0, padding:'16px 24px', display:'flex', justifyContent:'space-between', alignItems:'center', zIndex:10, background:'linear-gradient(to bottom,rgba(10,10,15,.9),transparent)', backdropFilter:'blur(8px)' }}>
        <span style={{ fontWeight:900, fontSize:18, background:'linear-gradient(135deg,#6c63ff,#a855f7)', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent' }}>MoodStream</span>
        <div style={{ display:'flex', alignItems:'center', gap:12 }}>
          {apiKey&&apiKey!=='demo'?<span style={{ fontSize:12, color:'var(--text-muted)', display:'flex', alignItems:'center', gap:6 }}><span className="success-dot"/>AI Active</span>:<span style={{ fontSize:12, color:'var(--text-muted)' }}>Offline mode</span>}
          <button className="btn-ghost" style={{ padding:'7px 12px', fontSize:13 }} onClick={()=>setShowSettings(true)}>⚙️ Settings</button>
        </div>
      </div>
      <div className="fade-in" style={{ textAlign:'center', maxWidth:560, position:'relative', zIndex:1 }}>
        <div style={{ fontSize:72, marginBottom:16, animation:'float 3s ease-in-out infinite' }}>🎭</div>
        <h1 style={{ fontSize:'clamp(30px,6vw,50px)', fontWeight:900, lineHeight:1.1, marginBottom:16 }}>
          Watch <span style={{ background:'linear-gradient(135deg,#6c63ff,#a855f7)', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent' }}>how you feel</span>
        </h1>
        <p style={{ fontSize:16, color:'var(--text-muted)', lineHeight:1.7, marginBottom:16 }}>
          Tell us how you're feeling and <strong style={{ color:'var(--text)' }}>MoodStream</strong> uses AI to curate the perfect movies, music, and videos for your mood.
        </p>
        <div style={{ marginBottom:40 }}><span className="llm-badge">✦ Powered by Groq · {GROQ_MODEL}</span></div>
        <div style={{ display:'flex', gap:10, justifyContent:'center', flexWrap:'wrap', marginBottom:48 }}>
          {Object.entries(EMOTION_CONFIG).map(([k,c])=>(
            <span key={k} style={{ padding:'6px 14px', borderRadius:999, background:c.bg, color:c.color, fontSize:13, fontWeight:600, border:`1px solid ${c.color}33` }}>{c.emoji} {c.label}</span>
          ))}
        </div>
        <button className="btn-primary" style={{ fontSize:17, padding:'16px 40px' }} onClick={()=>setStep('form')}>Discover my mood →</button>
        <p style={{ marginTop:16, fontSize:13, color:'var(--text-muted)' }}>🔒 Private · No account needed · ~30 seconds</p>
      </div>
      {showSettings && <SettingsModal apiKey={apiKey} onSave={k=>setApiKey(k||'demo')} onClose={()=>setShowSettings(false)} />}
    </div>
  );

  /* ── Screen: Form ── */
  if (step === 'form') return (
    <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:24, position:'relative' }}>
      <div className="noise-bg" />
      <div className="orb" style={{ width:400, height:400, top:-100, right:-100, background:'rgba(108,99,255,.10)' }} />
      <div className="fade-in" style={{ width:'100%', maxWidth:520, position:'relative', zIndex:1 }}>
        <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:32 }}>
          <button className="btn-ghost" style={{ padding:'8px 12px', fontSize:18 }} onClick={()=>formStep===1?reset():setFormStep(f=>f-1)}>←</button>
          <div style={{ flex:1 }}>
            <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6 }}>
              <span style={{ fontSize:13, color:'var(--text-muted)' }}>Step {formStep} of 3</span>
              <span style={{ fontSize:13, color:'var(--text-muted)' }}>{Math.round((formStep/3)*100)}%</span>
            </div>
            <div className="progress-bar"><div className="progress-fill" style={{ width:`${(formStep/3)*100}%` }}/></div>
          </div>
        </div>

        {formStep===1 && (
          <div className="card fade-in" style={{ padding:32 }}>
            <div style={{ fontSize:40, marginBottom:12, textAlign:'center' }}>💭</div>
            <h2 style={{ fontSize:22, fontWeight:800, marginBottom:8, textAlign:'center' }}>How are you feeling right now?</h2>
            <p style={{ color:'var(--text-muted)', fontSize:14, textAlign:'center', marginBottom:24 }}>Write anything — a word, a sentence, or just a vibe. The AI will understand.</p>
            <textarea className="form-input" rows={4} placeholder="e.g. I'm feeling a bit low today, miss my friends and just want to relax..." value={formData.text} onChange={e=>setFormData(fd=>({...fd,text:e.target.value}))} />
            <div style={{ marginTop:20 }}>
              <p style={{ fontSize:12, color:'var(--text-muted)', marginBottom:10 }}>Or pick a word that fits:</p>
              <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>
                {MOOD_WORDS.map(w=><button key={w} className={`word-chip ${formData.words.includes(w)?'selected':''}`} onClick={()=>handleWordToggle(w)}>{w}</button>)}
              </div>
            </div>
            <button className="btn-primary" style={{ width:'100%', marginTop:24 }} disabled={!canAdvance1} onClick={()=>setFormStep(2)}>Continue →</button>
          </div>
        )}

        {formStep===2 && (
          <div className="card fade-in" style={{ padding:32 }}>
            <div style={{ fontSize:40, marginBottom:12, textAlign:'center' }}>⚡</div>
            <h2 style={{ fontSize:22, fontWeight:800, marginBottom:8, textAlign:'center' }}>What's your energy level?</h2>
            <p style={{ color:'var(--text-muted)', fontSize:14, textAlign:'center', marginBottom:32 }}>This helps the AI understand your vibe more accurately.</p>
            <div style={{ padding:'0 8px' }}>
              <div style={{ display:'flex', justifyContent:'space-between', marginBottom:12, fontSize:13, color:'var(--text-muted)' }}>
                <span>😴 Drained</span><span>😐 Neutral</span><span>⚡ Wired</span>
              </div>
              <input type="range" min={1} max={5} step={1} value={formData.energy} onChange={e=>setFormData(fd=>({...fd,energy:Number(e.target.value)}))} />
              <div style={{ textAlign:'center', marginTop:16 }}>
                <span style={{ fontSize:36 }}>{['','😴','😓','😐','😊','⚡'][formData.energy]}</span>
                <div style={{ fontSize:14, color:'var(--text-muted)', marginTop:4 }}>{['','Very Low','Low','Moderate','High','Very High'][formData.energy]}</div>
              </div>
            </div>
            <div style={{ display:'flex', gap:12, marginTop:32 }}>
              <button className="btn-ghost" style={{ flex:1 }} onClick={()=>setFormStep(1)}>← Back</button>
              <button className="btn-primary" style={{ flex:2 }} onClick={()=>setFormStep(3)}>Continue →</button>
            </div>
          </div>
        )}

        {formStep===3 && (
          <div className="card fade-in" style={{ padding:32 }}>
            <div style={{ fontSize:40, marginBottom:12, textAlign:'center' }}>🎯</div>
            <h2 style={{ fontSize:22, fontWeight:800, marginBottom:8, textAlign:'center' }}>What do you need right now?</h2>
            <p style={{ color:'var(--text-muted)', fontSize:14, textAlign:'center', marginBottom:24 }}>This fine-tunes the AI's emotion analysis.</p>
            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              {INTENTS.map(intent=>(
                <button key={intent.id} className={`option-btn ${formData.intent===intent.id?'selected':''}`} onClick={()=>setFormData(fd=>({...fd,intent:intent.id}))}>
                  <div style={{ fontWeight:600, fontSize:15 }}>{intent.label}</div>
                  <div style={{ fontSize:12, color:'var(--text-muted)', marginTop:2 }}>{intent.desc}</div>
                </button>
              ))}
            </div>
            <div style={{ display:'flex', gap:12, marginTop:24 }}>
              <button className="btn-ghost" style={{ flex:1 }} onClick={()=>setFormStep(2)}>← Back</button>
              <button className="btn-primary" style={{ flex:2 }} disabled={!canAnalyze} onClick={handleAnalyze}>✨ Analyse with AI</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );

  /* ── Screen: Analyzing ── */
  if (step === 'analyzing') return (
    <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:24, position:'relative' }}>
      <div className="noise-bg" />
      <div style={{ textAlign:'center', position:'relative', zIndex:1 }}>
        <div style={{ position:'relative', width:120, height:120, margin:'0 auto 32px' }}>
          <div style={{ position:'absolute', inset:0, borderRadius:'50%', background:'linear-gradient(135deg,#6c63ff,#a855f7)', animation:'ripple 1.5s ease-out infinite' }} />
          <div style={{ position:'absolute', inset:10, borderRadius:'50%', background:'var(--surface2)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:36 }}>🧠</div>
        </div>
        <h2 style={{ fontSize:24, fontWeight:800, marginBottom:8 }}>Reading your vibe</h2>
        <p style={{ color:'var(--text-muted)', fontSize:15, marginBottom:6 }}>
          {analyzeMsg}
          <span className="dot" style={{ background:'#6c63ff' }}/><span className="dot" style={{ background:'#8b5cf6' }}/><span className="dot" style={{ background:'#a855f7' }}/>
        </p>
        <p style={{ fontSize:12, color:'var(--text-muted)', marginBottom:28 }}>Asking <span style={{ color:'#a78bfa' }}>Groq · {GROQ_MODEL}</span></p>
        <div style={{ width:280, margin:'0 auto' }}>
          <div className="progress-bar" style={{ height:6 }}><div className="progress-fill" style={{ width:`${analyzeProgress}%` }}/></div>
          <div style={{ fontSize:12, color:'var(--text-muted)', marginTop:8, textAlign:'right' }}>{Math.round(analyzeProgress)}%</div>
        </div>
      </div>
    </div>
  );

  /* ── Screen: Results ── */
  if (step === 'results' && ec && result) {
    const data = CONTENT[result.emotion];
    return (
      <div style={{ minHeight:'100vh', position:'relative' }}>
        <div className="noise-bg" />
        <div className="orb" style={{ width:500, height:500, top:-80, left:-80, background:ec.orb1 }} />
        <div className="orb" style={{ width:400, height:400, bottom:0, right:-80, background:ec.orb2 }} />
        <div style={{ maxWidth:900, margin:'0 auto', padding:'32px 20px', position:'relative', zIndex:1 }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:40 }}>
            <span style={{ fontSize:20, fontWeight:900, background:'linear-gradient(135deg,#6c63ff,#a855f7)', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent' }}>MoodStream</span>
            <div style={{ display:'flex', gap:10 }}>
              <button className="btn-ghost" style={{ padding:'7px 12px', fontSize:13 }} onClick={()=>setShowSettings(true)}>⚙️</button>
              <button className="btn-ghost" onClick={reset}>↩ New mood</button>
            </div>
          </div>

          {usedFallback && apiError && (
            <div className="error-banner fade-in" style={{ marginBottom:32 }}>
              <span>⚠️</span>
              <div><strong>Groq API issue:</strong> {apiError}<br/><span style={{ opacity:.8 }}>Using offline keyword detection. Results may be less precise.</span></div>
            </div>
          )}

          <div className="fade-in" style={{ textAlign:'center', marginBottom:40 }}>
            <div style={{ fontSize:80, marginBottom:12, animation:'float 3s ease-in-out infinite' }}>{ec.emoji}</div>
            <div style={{ marginBottom:10, display:'flex', justifyContent:'center', gap:8, flexWrap:'wrap' }}>
              <span style={{ padding:'6px 16px', borderRadius:999, background:ec.bg, color:ec.color, border:`1px solid ${ec.color}44`, fontWeight:700, fontSize:14 }}>✦ {ec.label}</span>
              {result.secondary && EMOTION_CONFIG[result.secondary] && (
                <span style={{ padding:'6px 16px', borderRadius:999, background:'rgba(255,255,255,.05)', color:'var(--text-muted)', border:'1px solid var(--border)', fontSize:13 }}>
                  also {EMOTION_CONFIG[result.secondary].emoji} {EMOTION_CONFIG[result.secondary].label}
                </span>
              )}
              {!usedFallback && <span className="llm-badge">✦ AI Detected</span>}
            </div>
            <h1 style={{ fontSize:'clamp(24px,5vw,36px)', fontWeight:900, margin:'14px 0 8px' }}>
              You're feeling <span style={{ background:ec.gradient, WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent' }}>{ec.label}</span>
            </h1>
          </div>

          {result.reason && (
            <div className="card fade-in" style={{ padding:'20px 24px', marginBottom:32, display:'flex', gap:16, alignItems:'flex-start', borderColor:ec.color+'33' }}>
              <div style={{ fontSize:28, marginTop:2 }}>🤖</div>
              <div style={{ flex:1 }}>
                <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:10 }}>
                  <div style={{ fontSize:13, fontWeight:700, color:ec.color }}>Why the AI thinks this</div>
                  {!usedFallback && <span className="llm-badge" style={{ fontSize:10 }}>Groq · {GROQ_MODEL}</span>}
                </div>
                <p style={{ fontSize:14, color:'var(--text-muted)', lineHeight:1.6, marginBottom:14 }}>"{result.reason}"</p>
                <ConfidenceBar value={result.confidence} color={ec.color} />
              </div>
            </div>
          )}

          <div style={{ display:'flex', gap:6, background:'var(--surface)', padding:6, borderRadius:14, marginBottom:36, width:'fit-content', margin:'0 auto 36px' }}>
            {[{id:'movies',label:'🎬 Movies'},{id:'music',label:'🎵 Music'},{id:'youtube',label:'📺 YouTube'}].map(tab=>(
              <button key={tab.id} className={`tab-btn ${activeTab===tab.id?'active':''}`} onClick={()=>setActiveTab(tab.id)}>{tab.label}</button>
            ))}
          </div>

          <div className="fade-in" key={activeTab}>
            {activeTab==='movies'  && <ContentSection title="Movies for you"        icon="🎬" items={data.movies}  type="movies"  />}
            {activeTab==='music'   && <ContentSection title="Music for your mood"   icon="🎵" items={data.music}   type="music"   />}
            {activeTab==='youtube' && <ContentSection title="Videos picked for you" icon="📺" items={data.youtube} type="youtube" />}
          </div>

          <div className="card" style={{ padding:24, marginTop:40, display:'flex', gap:20, alignItems:'center', flexWrap:'wrap' }}>
            <div style={{ flex:1, minWidth:200 }}>
              <div style={{ fontSize:12, color:'var(--text-muted)', marginBottom:4 }}>Your mood summary</div>
              <div style={{ fontSize:14, fontWeight:600, marginBottom:10 }}>{formData.text.slice(0,90)}{formData.text.length>90?'…':''}</div>
              <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
                <span style={{ fontSize:12, color:'var(--text-muted)', background:'var(--surface2)', padding:'3px 9px', borderRadius:6 }}>Energy: {['','Very Low','Low','Moderate','High','Very High'][formData.energy]}</span>
                <span style={{ fontSize:12, color:'var(--text-muted)', background:'var(--surface2)', padding:'3px 9px', borderRadius:6 }}>Seeking: {INTENTS.find(i=>i.id===formData.intent)?.label}</span>
              </div>
            </div>
            <button className="btn-ghost" onClick={reset}>Try a different mood →</button>
          </div>

          <p style={{ textAlign:'center', fontSize:12, color:'var(--text-muted)', marginTop:32, marginBottom:16 }}>
            MoodStream · Emotion detection by Groq · Your moods are never stored
          </p>
        </div>
        {showSettings && <SettingsModal apiKey={apiKey} onSave={k=>setApiKey(k||'demo')} onClose={()=>setShowSettings(false)} />}
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
